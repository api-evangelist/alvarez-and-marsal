  - name: Features
    type: Features
    data:
      - name: Turnaround And Restructuring
        description: A&M's founding practice, delivering interim management, Chapter 11 advisory, and crisis stabilization for distressed companies and creditors.
      - name: Performance Improvement
        description: Operational and financial transformation engagements covering cost optimization, working capital, supply chain, and finance function redesign.
      - name: Tax Advisory
        description: Federal, state, international, and transaction tax services delivered by A&M Taxand, the firm's global tax arm.
      - name: Disputes And Investigations
        description: Forensic accounting, fraud investigation, litigation support, expert testimony, and regulatory and internal investigations.
      - name: Transaction Advisory Group
        description: Buy-side and sell-side financial, operational, IT, and ESG due diligence for corporate and private equity acquirers.
      - name: Private Equity Performance Improvement (PEPI)
        description: Operational diligence and post-close value-creation execution across the private equity hold cycle.
      - name: Corporate Transformation Services
        description: Enterprise-wide change programs combining strategy, operations, technology, and talent levers.
      - name: Valuation Services
        description: Business, intangible asset, financial instrument, and tax valuations for transactions, reporting, and disputes.
      - name: A&M Insights
        description: Publicly published research, reports, and articles produced across all practice areas on alvarezandmarsal.com/insights.
      - name: A&M Capital Partners
        description: A&M's middle-market private equity investment platform, operated separately from the consulting business.
  - name: Use Cases
    type: UseCases
    data:
      - name: Corporate Turnaround And Chapter 11 Advisory
        description: Boards and creditors retain A&M to stabilize distressed businesses, lead Chapter 11 cases, and serve in interim executive roles.
      - name: Post-Merger Integration And Carve-Out Execution
        description: Acquirers and divestors use A&M to plan and run integrations, carve-outs, TSA exits, and Day-1 readiness.
      - name: Private Equity Value Creation
        description: PE sponsors engage PEPI for commercial and operational diligence and 100-day plans through hold-period value capture.
      - name: Forensic Investigation And Litigation Support
        description: General counsel and regulators engage A&M Disputes and Investigations for fraud investigations, expert testimony, and monitorships.
      - name: Tax Structuring And Controversy
        description: Multinational corporates and PE funds use A&M Tax for structuring, compliance, transfer pricing, and controversy support.
      - name: Public Sector Transformation
        description: Federal, state, and local governments retain A&M for program turnaround, financial management, and operational transformation.
  - name: Industries
    type: Industries
    data:
      - name: Financial Services
        description: Banking, insurance, capital markets, asset management, and fintech engagements.
      - name: Healthcare
        description: Providers, payers, pharma, medtech, and life sciences performance and restructuring work.
      - name: Energy
        description: Oil and gas, power and utilities, renewables, and energy transition advisory.
      - name: Retail And Consumer
        description: Retail restructuring, brand performance, merchandising, and supply chain transformation.
      - name: Real Estate
        description: Real estate advisory, hospitality, and asset-level operational improvement.
      - name: Public Sector
        description: Federal, state, local, education, and not-for-profit client engagements.
      - name: Technology Media And Telecom
        description: Software, media, and telecommunications transformation and transaction work.
      - name: Industrials And Manufacturing
        description: Manufacturing operations, supply chain, and capital project performance.
  - name: Compliance
    type: Compliance
    data:
      - name: Client Confidentiality
        description: All engagements operate under master consulting agreements with strict confidentiality and conflict-management terms.
      - name: GDPR
        description: European client and personal data handling is governed by the EU General Data Protection Regulation.
      - name: SOC 2
        description: A&M's hosted client environments and managed engagement platforms follow SOC 2 controls.
      - name: ISO 27001
        description: A&M's information security management aligns with the ISO 27001 control framework.
      - name: Independence And Conflicts
        description: As an advisory firm regularly retained in distressed and disputed matters, A&M maintains independence and conflict-clearance processes consistent with court and regulator expectations.
