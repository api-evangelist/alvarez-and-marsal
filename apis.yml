description: >-
  Alvarez & Marsal (A&M) is a leading global professional services firm,
  founded in 1983 by Tony Alvarez II and Bryan Marsal and headquartered
  in New York City. Privately held, the firm employs more than 10,000
  people across six continents and is best known for turnaround and
  restructuring engagements (Lehman Brothers, HealthSouth, Tribune, FTX,
  Arthur Andersen) and for performance improvement, tax advisory,
  transaction advisory, disputes and investigations, valuation, and
  private equity performance improvement (PEPI) services. A&M does not
  operate a public developer portal; technology is delivered through
  client engagements, internal proprietary tools, A&M Capital Partners
  (the firm's investment arm), and a public Insights / thought-leadership
  surface published on alvarezandmarsal.com.
